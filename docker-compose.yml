services:
  gemini-router:
    build: .
    image: gemini-router:latest
    container_name: gemini-router
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: "/data/config.json"
      GEMINI_ENDPOINT: "https://generativelanguage.googleapis.com"
    volumes:
      - gemini-router-data:/data

volumes:
  gemini-router-data:
